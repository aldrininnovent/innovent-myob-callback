<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYOB Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
        }
        .message {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .message h2 {
            color: #333;
            margin-bottom: 0.5rem;
        }
        .message p {
            color: #666;
        }
    </style>
</head>
<body>
    <div class="message">
        <h2>Authentication complete</h2>
        <p>You can close this window.</p>
    </div>
</body>
</html>
